name: Build Winlator WCP DXVK 2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Official DXVK 2.0
        run: |
          curl -L -o dxvk-2.0.tar.gz https://github.com/doitsujin/dxvk/releases/download/v2.0/dxvk-2.0.tar.gz

      - name: Extract and Structure
        run: |
          tar -xzvf dxvk-2.0.tar.gz
          mkdir -p workspace
          
          find . -type d -name "x32" -exec mv {} workspace/ \;
          find . -type d -name "x64" -exec mv {} workspace/ \;
          
          if [ -f "profile.json" ]; then 
            cp profile.json workspace/
          fi

      - name: Create Layer 1 Archive
        run: |
          cd workspace
          tar -cvf ../DXVK-2.0 .
          cd ..

      - name: Create Final WCP Container
        run: |
          mkdir -p deploy
          mv DXVK-2.0 deploy/
          tar -cJf DXVK-2.0.wcp.xz -C deploy DXVK-2.0

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-2.0-Package
          path: DXVK-2.0.wcp.xz
