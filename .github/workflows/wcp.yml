name: Build DXVK Legacy 0.20

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-legacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download DXVK 0.20
        run: |
          curl -L -o dxvk_0.20.tar.gz "https://github.com/doitsujin/dxvk/releases/download/v0.20/dxvk-0.20.tar.gz"

      - name: Extract and Map
        run: |
          mkdir -p temp workspace/system32 workspace/syswow64
          tar -xzvf dxvk_0.20.tar.gz -C temp
          
          cp -r $(find temp -type d -name "x64" | head -n 1)/. workspace/system32/
          cp -r $(find temp -type d -name "x32" | head -n 1)/. workspace/syswow64/
          
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "DXVK-0.20-Legacy",
            "versionCode": 20,
            "description": "Legacy DXVK 0.20 for Mali Testing",
            "files": [
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create WCP
        run: |
          tar -cJf DXVK-0.20-Legacy.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-0.20-Legacy-Package
          path: DXVK-0.20-Legacy.wcp.xz
