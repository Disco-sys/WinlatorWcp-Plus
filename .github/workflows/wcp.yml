name: Build Hybrid DXVK 1.6-1.7 Mali Optimized

on:
  workflow_dispatch:

jobs:
  build-hybrid:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y meson mingw-w64 g++-mingw-w64-x86-64 g++-mingw-w64-i686 glslang-tools

      - name: Source
        run: |
          curl -L -o v1.7.zip https://github.com/doitsujin/dxvk/archive/refs/tags/v1.7.zip
          unzip v1.7.zip
          mv dxvk-1.7 src

      - name: Apply Optimizations and Bug Fixes
        run: |
          cd src
          # Force Feature Level 10_1 for stability on Mali G52
          sed -i 's/D3D_FEATURE_LEVEL_11_1/D3D_FEATURE_LEVEL_10_1/g' src/d3d11/d3d11_device.cpp
          sed -i 's/D3D_FEATURE_LEVEL_11_0/D3D_FEATURE_LEVEL_10_1/g' src/d3d11/d3d11_device.cpp
          
          # Remove Robustness2 Requirement (Hard-patching the checks)
          sed -i 's/device->features().robustness2/true/g' src/dxvk/dxvk_device.cpp
          sed -i 's/features.robustness2/true/g' src/dxvk/dxvk_device.cpp
          sed -i '/VK_EXT_ROBUSTNESS_2_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp
          
          # Remove Transform Feedback Requirement (Common crash on mobile drivers)
          sed -i '/VK_EXT_TRANSFORM_FEEDBACK_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp
          
          # Backporting 1.6.1-style lighter descriptor management to reduce overhead
          sed -i 's/config.enableResidencyLimit = true/config.enableResidencyLimit = false/g' src/dxvk/dxvk_context.cpp

      - name: Compile
        run: |
          cd src
          ./package-release.sh master ../build --no-package

      - name: WCP
        run: |
          mkdir -p out/system32 out/syswow64
          cp -r build/dxvk-master/x64/. out/system32/
          cp -r build/dxvk-master/x32/. out/syswow64/
          
          cat <<EOF > out/profile.json
          {
            "type": "DXVK",
            "versionName": "DXVK-1.7-Hybrid-Mali",
            "versionCode": 171,
            "description": "1.7 base | 1.6.1-style extension removal | Mali-G52 Optimized",
            "files": [
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF
          
          tar -cJf DXVK-1.7-Hybrid.wcp.xz -C out .

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-1.7-Hybrid-Mali
          path: DXVK-1.7-Hybrid.wcp.xz
