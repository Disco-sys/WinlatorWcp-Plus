name: Build Winlator WCP DXVK 2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Official DXVK 2.0
        run: |
          curl -L -o dxvk-2.0.tar.gz https://github.com/doitsujin/dxvk/releases/download/v2.0/dxvk-2.0.tar.gz

      - name: Extract and Map Architecture
        run: |
          tar -xzvf dxvk-2.0.tar.gz
          mkdir -p workspace
          mv dxvk-2.0/x64 workspace/system32
          mv dxvk-2.0/x32 workspace/syswow64
          
          # Creating a clean profile.json that matches ONLY the files we actually have
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "2.0",
            "versionCode": 1,
            "description": "DXVK-2.0",
            "files": [
              { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
              { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
              { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create Single Layer WCP
        run: |
          tar -cJf DXVK-2.0.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-2.0-Final-Fixed
          path: DXVK-2.0.wcp.xz
