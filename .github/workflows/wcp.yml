name: Build DXVK Sarek-Merged Mali-Fix

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-merged-mali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Components
        run: |
          curl -L -o sarek_1.11.1_mali.tar.gz https://github.com/zeyadadev/DXVK-Sarek/releases/download/v1.11.1-mali-fix/dxvk-sarek-1.11.1.tar.gz
          curl -L -o sarek_1.10.9_async.tar.gz https://github.com/pythonlover02/DXVK-Sarek/releases/download/1.10.9/dxvk-async-1.10.9.tar.gz

      - name: Extract and Hybrid Map
        run: |
          mkdir -p v11_temp v10_temp workspace/system32 workspace/syswow64
          
          tar -xzvf sarek_1.11.1_mali.tar.gz -C v11_temp
          tar -xzvf sarek_1.10.9_async.tar.gz -C v10_temp
          
          cp -r $(find v11_temp -type d -name "x64" | head -n 1)/. workspace/system32/
          cp -r $(find v10_temp -type d -name "x32" | head -n 1)/. workspace/syswow64/
          
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "Sarek-Merged-Mali",
            "versionCode": 2,
            "description": "64-bit Sarek 1.11.1 Mali-Fix | 32-bit Sarek 1.10.9 Async",
            "files": [
              { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
              { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
              { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create Merged WCP
        run: |
          tar -cJf DXVK-Sarek-Merged-Mali.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sarek-Merged-Mali-Build
          path: DXVK-Sarek-Merged-Mali.wcp.xz
