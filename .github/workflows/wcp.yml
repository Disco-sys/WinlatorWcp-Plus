name: Build DXVK Sarek-Merged Async

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-merged-async:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Sarek 1.11.0 Async
        run: |
          curl -L -o sarek_1.11.0_async.tar.gz https://github.com/pythonlover02/DXVK-Sarek/releases/download/1.11.0/dxvk-async-1.11.0.tar.gz

      - name: Download Sporif 1.10.3 Async
        run: |
          curl -L -o dxvk_1.10.3_async.tar.gz https://github.com/Sporif/dxvk-async/releases/download/1.10.3/dxvk-async-1.10.3.tar.gz

      - name: Extract and Hybrid Map
        run: |
          mkdir -p v11_async_temp v10_async_temp workspace
          tar -xzvf sarek_1.11.0_async.tar.gz -C v11_async_temp
          tar -xzvf dxvk_1.10.3_async.tar.gz -C v10_async_temp
          
          mv v11_async_temp/dxvk-1.11.0/x64 workspace/system32
          mv v10_async_temp/dxvk-async-1.10.3/x32 workspace/syswow64
          
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "Sarek-Merged-Async",
            "versionCode": 6,
            "description": "64-bit Sarek 1.11.0 Async | 32-bit Sporif 1.10.3 Async",
            "files": [
              { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
              { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
              { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create Merged WCP
        run: |
          tar -cJf DXVK-Sarek-Merged-Async.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sarek-Merged-Async-Package
          path: DXVK-Sarek-Merged-Async.wcp.xz
