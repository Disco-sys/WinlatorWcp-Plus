name: Build DXVK-2.0 WCP for Winlator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p inner-content/system32
          mkdir -p inner-content/syswow64

      - name: Create inner DXVK-2.0.tar
        run: |
          cd inner-content
          tar -cvf ../DXVK-2.0.tar .
          cd ..
          tar -tf DXVK-2.0.tar | head -20

      - name: Create outer DXVK-2.0.wcp.xz
        run: |
          tar -cJf DXVK-2.0.tar.xz DXVK-2.0.tar
          mv DXVK-2.0.tar.xz DXVK-2.0.wcp.xz
          tar -tf DXVK-2.0.wcp.xz

      - name: Upload DXVK-2.0.wcp.xz artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-2.0-wcp
          path: DXVK-2.0.wcp.xz
          retention-days: 30

      - name: Upload DXVK-2.0.tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-2.0-tar
          path: DXVK-2.0.tar
          retention-days: 7
