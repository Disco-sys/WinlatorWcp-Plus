name: Build Winlator WCP DXVK 2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Official DXVK 2.0
        run: |
          curl -L -o dxvk-2.0.tar.gz https://github.com/doitsujin/dxvk/releases/download/v2.0/dxvk-2.0.tar.gz

      - name: Initialize Architecture
        run: |
          mkdir -p layer1/"."
          mv dxvk-2.0.tar.gz layer1/"."/
          if [ -f "profile.json" ]; then cp profile.json layer1/"."; fi

      - name: Create Internal Archive
        run: |
          cd layer1
          tar -cvzf ../dxvk-v2.0-internal.tar.gz .
          cd ..

      - name: Create WCP Container
        run: |
          mkdir -p final_layer
          mv dxvk-v2.0-internal.tar.gz final_layer/
          tar -cJf DXVK-2.0.wcp -C final_layer dxvk-v2.0-internal.tar.gz

      - name: Deploy Component
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-2.0-WCP
          path: DXVK-2.0.wcp
          if-no-files-found: error
