name: Wine 11.5 WCP Creator

on:
  push:
  workflow_dispatch:

jobs:
  build-wcp:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y xz-utils jq tar

    - name: Download Sources
      run: |
        curl -L -o wine-11.5.tar.xz https://github.com/Kron4ek/Wine-Builds/releases/download/11.5/wine-11.5-amd64.tar.xz
        curl -L -o proton-base.wcp.xz https://github.com/StevenMXZ/Contents-Cmod/releases/download/1.2.0/proton-10-arm64ec.wcp.xz

    - name: Extract Wine 11.5
      run: |
        mkdir wine_temp
        tar -xf wine-11.5.tar.xz -C wine_temp --strip-components=1
        rm -rf wine_temp/bin/*
        rm -rf wine_temp/share/man
        rm -rf wine_temp/share/applications
        rm -rf wine_temp/lib/wine/*

    - name: Extract and Prepare Proton Base
      run: |
        mkdir proton_raw
        xz -d -c proton-base.wcp.xz | tar -x -C proton_raw || true
        
        mkdir final_structure
        if [ -d "proton_raw/." ]; then
          cp -r proton_raw/. final_structure/
        else
          cp -r proton_raw/* final_structure/ 2>/dev/null || cp -r proton_raw final_structure/
        fi

    - name: Overlay Wine and Patch JSON
      run: |
        cp -rf wine_temp/bin/* final_structure/bin/ 2>/dev/null || cp -rf wine_temp/bin final_structure/
        cp -rf wine_temp/lib/* final_structure/lib/ 2>/dev/null || cp -rf wine_temp/lib final_structure/
        cp -rf wine_temp/share/* final_structure/share/ 2>/dev/null || cp -rf wine_temp/share final_structure/

        if [ -f final_structure/profile.json ]; then
          jq '.type = "WINE" | 
              .versionName = "Wine 11.5" | 
              .versionCode = 1105 | 
              .description = "Wine 11.5 Hybrid Build"' \
              final_structure/profile.json > final_structure/profile.json.tmp && mv final_structure/profile.json.tmp final_structure/profile.json
        else
          echo '{"type":"WINE","versionName":"Wine 11.5","versionCode":1105,"description":"Wine 11.5 Hybrid"}' > final_structure/profile.json
        fi

    - name: Archive WCP
      run: |
        cd final_structure
        tar -cf - . | xz -T0 -1 > "../wine-11.5-hybrid.wcp.xz"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Wine-11.5-Hybrid
        path: wine-11.5-hybrid.wcp.xz
