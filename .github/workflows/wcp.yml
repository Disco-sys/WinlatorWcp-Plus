name: 1.5.5 Async Only

on:
  push:
  workflow_dispatch:

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch and Extract Source
      run: |
        curl -L -o v1.5.5.zip https://github.com/doitsujin/dxvk/archive/refs/tags/v1.5.5.zip
        unzip v1.5.5.zip
        mv dxvk-1.5.5/* .
        git config --global user.email "bot@example.com"
        git config --global user.name "Bot"
        git init
        git add .
        git commit -m "init"

    - name: Apply Async & GCC 15 Fixes
      run: |
        # 1. Professional GCC 15 Compatibility Fix
        echo "#include <cstdint>" > gcc15_fix.h
        echo "#include <cstddef>" >> gcc15_fix.h
        sed -i "s|cpp_std=c++17|cpp_std=c++17', 'cpp_args=-I. -include gcc15_fix.h', 'c_args=-I. -include gcc15_fix.h|g" meson.build

        # 2. Inject Async Configuration Option
        # This adds 'dxvk.enableAsync' to the config health check
        sed -i '/useRawSsbo/a \      this->enableAsync = config.getOption<bool>("dxvk.enableAsync", false);' src/dxvk/dxvk_options.cpp
        sed -i '/useRawSsbo/a \    bool enableAsync;' src/dxvk/dxvk_options.h

        # 3. Patch Pipeline Compiler (The Core Async Logic)
        # We modify the compiler to check our new enableAsync flag
        sed -i 's/if (m_program->getShader(stage) != nullptr)/if (!m_device->config().enableAsync \&\& m_program->getShader(stage) != nullptr)/g' src/dxvk/dxvk_pipeline.cpp

    - name: Build with Arch-MinGW
      id: build-release
      uses: Joshua-Ashton/arch-mingw-github-action@v8
      with:
        command: |
          ./package-release.sh master build --no-package

    - name: Create WCP
      run: |
        mkdir -p out/system32 out/syswow64
        cp -r build/dxvk-master/x64/. out/system32/
        cp -r build/dxvk-master/x32/. out/syswow64/
        cat <<EOF > out/profile.json
        {
          "type": "DXVK",
          "versionName": "1.5.5 Async",
          "versionCode": 1550,
          "description": "DXVK 1.5.5 with Async Shader Compilation",
          "files": [
            { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
            { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
            { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
            { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
            { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
            { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
            { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
            { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
          ]
        }
        EOF
        tar -cJf "1.5.5-Async.wcp.xz" -C out .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 1.5.5-Async
        path: "1.5.5-Async.wcp.xz"
