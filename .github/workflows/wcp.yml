name: 1.10.3 Modded

on:
  push:
  workflow_dispatch:

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch and Extract Source
      run: |
        curl -L -o dxvk-1.10.3.tar.gz https://github.com/doitsujin/dxvk/releases/download/v1.10.3/dxvk-1.10.3.tar.gz
        tar -xzvf dxvk-1.10.3.tar.gz
        # The tar.gz extracts into a folder named 'dxvk-1.10.3'
        mv dxvk-1.10.3 src
        cd src
        git config --global user.email "bot@example.com"
        git config --global user.name "Bot"
        git init
        git add .
        git commit -m "init"

    - name: Patch
      run: |
        # Fixed paths: removed the extra 'src/' prefix since we are already inside the 'src' folder
        cd src
        sed -i 's/m_features.extRobustness2.robustness2/true/g' src/dxvk/dxvk_device.cpp
        sed -i 's/m_features.extRobustness2.nullDescriptor/true/g' src/dxvk/dxvk_device.cpp
        sed -i 's/m_features.extRobustness2.robustBufferAccess2/true/g' src/dxvk/dxvk_device.cpp
        sed -i '/VK_EXT_ROBUSTNESS_2_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp
        sed -i '/VK_EXT_TRANSFORM_FEEDBACK_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp
        sed -i 's/D3D_FEATURE_LEVEL_11_0/D3D_FEATURE_LEVEL_11_1/g' src/d3d11/d3d11_device.cpp
        sed -i 's/m_features.core.features.geometryShader/true/g' src/dxvk/dxvk_device.cpp

    - name: Build with Arch-MinGW
      id: build-release
      uses: Joshua-Ashton/arch-mingw-github-action@v8
      with:
        command: |
          cd src
          ./package-release.sh master ../build --no-package

    - name: Create WCP
      run: |
        mkdir -p out/system32 out/syswow64
        cp -r build/dxvk-master/x64/. out/system32/
        cp -r build/dxvk-master/x32/. out/syswow64/
        cat <<EOF > out/profile.json
        {
          "type": "DXVK",
          "versionName": "1.10.3 Modded",
          "versionCode": 1103,
          "description": "1.10.3 Modded",
          "files": [
            { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
            { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
            { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
            { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
            { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
            { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
            { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
            { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
          ]
        }
        EOF
        tar -cJf "1.10.3-Modded.wcp.xz" -C out .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 1.10.3-Modded
        path: "1.10.3-Modded.wcp.xz"
