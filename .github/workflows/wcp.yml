name: Build DXVK Mali-Force Collection 1.7-1.10.3

on:
  workflow_dispatch:

jobs:
  bundle-patched-dxvk:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y meson mingw-w64 g++-mingw-w64-x86-64 g++-mingw-w64-i686 glslang-tools

      - name: Process
        run: |
          VERSIONS=("1.10.3" "1.10.2" "1.10.1" "1.10" "1.9.4" "1.9.3" "1.9.2" "1.9.1" "1.9" "1.8.1" "1.8" "1.7.3" "1.7.2" "1.7.1" "1.7")
          mkdir -p "DXVK 1.7-1.10.3 Patched"
          
          for VER in "${VERSIONS[@]}"; do
            git clone --recursive https://github.com/doitsujin/dxvk.git "src_$VER"
            cd "src_$VER"
            git checkout "v$VER"
            
            sed -i 's/device->features().robustness2/true/g' src/dxvk/dxvk_device.cpp 2>/dev/null || true
            sed -i 's/features.robustness2/true/g' src/dxvk/dxvk_device.cpp 2>/dev/null || true
            sed -i '/VK_EXT_ROBUSTNESS_2_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp 2>/dev/null || true
            sed -i '/VK_EXT_TRANSFORM_FEEDBACK_EXTENSION_NAME/d' src/dxvk/dxvk_extensions.cpp 2>/dev/null || true
            sed -i 's/D3D_FEATURE_LEVEL_11_1/D3D_FEATURE_LEVEL_10_1/g' src/d3d11/d3d11_device.cpp 2>/dev/null || true
            sed -i 's/D3D_FEATURE_LEVEL_11_0/D3D_FEATURE_LEVEL_10_1/g' src/d3d11/d3d11_device.cpp 2>/dev/null || true
            
            ./package-release.sh master "../build_$VER" --no-package
            cd ..
            
            mkdir -p "wcp_$VER/system32" "wcp_$VER/syswow64"
            cp -r "build_$VER/dxvk-master/x64/." "wcp_$VER/system32/"
            cp -r "build_$VER/dxvk-master/x32/." "wcp_$VER/syswow64/"
            
            cat <<EOF > "wcp_$VER/profile.json"
          {
            "type": "DXVK",
            "versionName": "DXVK-$VER-Patched",
            "versionCode": ${VER//./},
            "description": "Patched: No Robustness2, Force 10_1",
            "files": [
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF
            
            tar -cJf "DXVK 1.7-1.10.3 Patched/DXVK-$VER-Patched.wcp.xz" -C "wcp_$VER" .
            rm -rf "src_$VER" "build_$VER" "wcp_$VER"
          done

      - name: Compress
        run: |
          zip -9 -r "patched_dxvk_versions.zip" "DXVK 1.7-1.10.3 Patched/"

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Patched-DXVK-Mali
          path: patched_dxvk_versions.zip
