name: Build Winlator WCP DXVK-Async 2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download DXVK-Async 2.0
        run: |
          curl -L -o dxvk-async-2.0.tar.gz https://github.com/Sporif/dxvk-async/releases/download/2.0/dxvk-async-2.0.tar.gz

      - name: Extract and Map Architecture
        run: |
          tar -xzvf dxvk-async-2.0.tar.gz
          mkdir -p workspace
          # Mapping Sporif's x64/x32 to Winlator's system32/syswow64
          mv dxvk-2.0/x64 workspace/system32
          mv dxvk-2.0/x32 workspace/syswow64
          
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "2.0-Async",
            "versionCode": 2,
            "description": "DXVK-2.0-Async-Sporif",
            "files": [
              { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
              { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
              { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create Single Layer WCP
        run: |
          tar -cJf DXVK-Async-2.0.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-Async-2.0-Final
          path: DXVK-Async-2.0.wcp.xz
