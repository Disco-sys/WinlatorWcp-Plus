name: Build DXVK Sarek-Merged Double-Extract

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-merged-async:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download WCP Files
        run: |
          curl -L -o sarek_64.wcp "https://github.com/Arihany/WinlatorWCPHub/releases/download/DXVK-SAREK-ASYNC/dxvk-sarek-async-1.11.0.wcp"
          curl -L -o sporif_32.wcp "https://github.com/StevenMXZ/Winlator-Contents/raw/main/DXVK/dxvk-1.10.3-async.wcp"

      - name: Double Extract 64-bit Sarek
        run: |
          mkdir -p v64_layer1 v64_layer2
          7z x sarek_64.wcp -ov64_layer1 -y
          
          # Find the nested archive in Layer 1 and extract to Layer 2
          find v64_layer1 -type f \( -name "*.wcp" -o -name "*.zip" -o -name "*.tar.xz" \) -exec 7z x {} -ov64_layer2 -y \;
          
          # Handle the "." or nested folder structure
          mkdir -p workspace/system32
          cp -r $(find v64_layer2 -type d -name "system32" | head -n 1)/. workspace/system32/

      - name: Double Extract 32-bit Sporif
        run: |
          mkdir -p v32_layer1 v32_layer2
          7z x sporif_32.wcp -ov32_layer1 -y
          
          # Find the nested archive in Layer 1 and extract to Layer 2
          find v32_layer1 -type f \( -name "*.wcp" -o -name "*.zip" -o -name "*.tar.xz" \) -exec 7z x {} -ov32_layer2 -y \;
          
          # Handle the "." or nested folder structure
          mkdir -p workspace/syswow64
          cp -r $(find v32_layer2 -type d -name "syswow64" | head -n 1)/. workspace/syswow64/

      - name: Create Hybrid Profile
        run: |
          cat <<EOF > workspace/profile.json
          {
            "type": "DXVK",
            "versionName": "Sarek-Merged-Async",
            "versionCode": 11,
            "description": "64-bit Sarek 1.11.0 | 32-bit Sporif 1.10.3",
            "files": [
              { "source": "system32/d3d9.dll", "target": "\${system32}/d3d9.dll" },
              { "source": "system32/d3d10core.dll", "target": "\${system32}/d3d10core.dll" },
              { "source": "system32/d3d11.dll", "target": "\${system32}/d3d11.dll" },
              { "source": "system32/dxgi.dll", "target": "\${system32}/dxgi.dll" },
              { "source": "syswow64/d3d9.dll", "target": "\${syswow64}/d3d9.dll" },
              { "source": "syswow64/d3d10core.dll", "target": "\${syswow64}/d3d10core.dll" },
              { "source": "syswow64/d3d11.dll", "target": "\${syswow64}/d3d11.dll" },
              { "source": "syswow64/dxgi.dll", "target": "\${syswow64}/dxgi.dll" }
            ]
          }
          EOF

      - name: Create Final WCP
        run: |
          tar -cJf DXVK-Sarek-Merged-Async.wcp.xz -C workspace .

      - name: Deploy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sarek-Merged-Async-Final
          path: DXVK-Sarek-Merged-Async.wcp.xz
